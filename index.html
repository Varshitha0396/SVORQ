<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVORQ - Timeless Luxury</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c3996b">

  <!-- Smooth Scroll -->
  <style>
    html {
      scroll-behavior: smooth;
    }
  </style>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="container">

    <!-- LOGO -->
    <div class="logo">
  <img src="logo.png" alt="SVORQ Logo" class="logo-img">
</div>

    <!-- NAV -->
    <nav class="nav">
      <a href="javascript:void(0)" onclick="filterCategory('all')">Shop All</a>
      <a href="javascript:void(0)" onclick="filterCategory('jewellery')">Jewellery</a>
      <a href="#" onclick="filterCategory('fashion')">Fashion</a>
    </nav>

    <!-- RIGHT -->
    <div class="header-right">

      <div class="search-container">
        <input type="text" id="search-input" placeholder="Search..." onkeyup="searchProducts()">
      </div>

      <i class="fas fa-heart" onclick="showWishlist()">
        <span id="wishlist-count">0</span>
      </i>

      <i class="fas fa-shopping-bag" onclick="toggleCart()">
        <span id="cart-count">0</span>
      </i>

    </div>

  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Timeless Luxury</h1>
    <p>Stainless Steel Jewellery • Elegant Fashion</p>

    <button class="btn-primary" onclick="document.getElementById('products-section').scrollIntoView({behavior:'smooth'})">
      Shop Now
    </button>

    <button class="btn-secondary" onclick="installApp()">
      Install App 📱
    </button>
  </div>
</section>

<!-- PRODUCTS -->
<section id="products-section" class="products-section">
  <div class="container">
    <h2 class="section-title">Our Collection</h2>
    <div class="product-grid" id="product-grid"></div>
  </div>
</section>

<!-- CART -->
<div id="cart-sidebar" class="cart-sidebar">
  <div class="cart-header">
    <h3>Your Cart (<span id="sidebar-cart-count">0</span>)</h3>
    <i class="fas fa-times" onclick="toggleCart()"></i>
  </div>

  <div id="cart-items" class="cart-items"></div>

  <div class="cart-footer">
    <div class="cart-total">
      Total: <strong id="cart-total">₹0</strong>
    </div>

    <button class="btn-primary" onclick="checkout()">Checkout (WhatsApp)</button>
    <button class="btn-secondary" onclick="clearCart()">Clear Cart</button>
  </div>
</div>

<!-- MODAL -->
<div id="quick-view-modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <div id="modal-body"></div>
  </div>
</div>

<!-- WHATSAPP FLOAT -->
<a href="https://wa.me/918309304255" class="whatsapp-float" target="_blank">
  <i class="fab fa-whatsapp"></i>
</a>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- MOBILE FIX -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SVORQ - Timeless Luxury</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css?v=4">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c3996b">

  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="SVORQ">
  <link rel="apple-touch-icon" href="icon.png">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Razorpay -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <img src="logo.png" class="loader-logo" alt="SVORQ Logo">
</div>

<!-- HEADER -->
<header class="header">
  <div class="container header-clean">

    <!-- LOGO -->
    <div class="logo">
      <img src="logo.png" class="logo-img" alt="SVORQ Logo">
    </div>

    <!-- NAV -->
    <nav class="nav-center">

      <a onclick="filterCategory('all')">Shop</a>

      <!-- DROPDOWN -->
      <div class="dropdown">
        <a onclick="toggleDropdown()">Jewellery ▾</a>

        <div id="dropdown-menu" class="dropdown-menu">
          <a onclick="filterCategory('layered')">Layered Chains</a>
          <a onclick="filterCategory('pendant')">Pendant Necklaces</a>
          <a onclick="filterCategory('earrings')">Earrings</a>
          <a onclick="filterCategory('rings')">Rings</a>
          <a onclick="filterCategory('bracelet')">Bracelets</a>
          <a onclick="filterCategory('anklets')">Anklets</a>
          <a onclick="filterCategory('statement')">Statement</a>
        </div>
      </div>

      <a onclick="filterCategory('fashion')">Fashion</a>

    </nav>

    <!-- RIGHT ICONS -->
    <div class="header-right">

      <i class="fas fa-search"></i>

      <!-- ❤️ GO TO WISHLIST PAGE -->
      <i class="fas fa-heart" onclick="window.location.href='wishlist.html'">
        <span id="wishlist-count">0</span>
      </i>

      <!-- 🛒 GO TO CART PAGE -->
      <i class="fas fa-shopping-bag" onclick="window.location.href='cart.html'">
        <span id="cart-count">0</span>
      </i>

    </div>

  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Timeless Luxury</h1>
    <p>Luxury Jewellery Crafted for Everyday Elegance ✨</p>

    <button class="btn-primary"
      onclick="document.getElementById('products-section').scrollIntoView({behavior:'smooth'})">
      Shop Now
    </button>

    <button id="install-btn" class="btn-secondary" onclick="installApp()" style="display:none;">
      Install App 📱
    </button>
  </div>
</section>

<!-- CATEGORY -->
<section class="categories">
  <button onclick="filterCategory('all')">All</button>
  <button onclick="filterCategory('layered')">Layered</button>
  <button onclick="filterCategory('pendant')">Pendant</button>
  <button onclick="filterCategory('earrings')">Earrings</button>
  <button onclick="filterCategory('rings')">Rings</button>
  <button onclick="filterCategory('bracelet')">Bracelets</button>
  <button onclick="filterCategory('statement')">Statement</button>
</section>

<!-- PRODUCTS -->
<section id="products-section" class="products-section">
  <div class="container">
    <h2 class="section-title">Our Collection</h2>
    <div class="product-grid" id="product-grid"></div>
  </div>
</section>

<!-- WHATSAPP -->
<a href="https://wa.me/918309304255" class="whatsapp-float">
  <i class="fab fa-whatsapp"></i>
</a>

<!-- SCRIPT -->
<script src="script.js?v=4"></script>

<!-- 🔥 DROPDOWN FIX SCRIPT -->
<script>
function toggleDropdown() {
  document.getElementById("dropdown-menu").classList.toggle("show");
}

// Close dropdown when clicking outside
document.addEventListener("click", function(e) {
  const dropdown = document.querySelector(".dropdown");
  const menu = document.getElementById("dropdown-menu");

  if (!dropdown.contains(e.target)) {
    menu.classList.remove("show");
  }
});
</script>

</body>
</html>

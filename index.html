<!DOCTYPE html>
<html>
<head>
  <title>SVORQ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background: #f8f6f2;
      color: #2c2c2c;
    }

    /* HEADER /
    header {
      text-align: center;
      padding: 25px;
      font-size: 28px;
      letter-spacing: 3px;
      color: #c9a646;
      background: white;
      position: sticky;
      top: 0;
    }

    / HERO SECTION /
    .hero {
      text-align: center;
      padding: 80px 20px;
    }

    .hero h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #777;
      font-size: 16px;
    }

    / SECTION /
    .section {
      padding: 30px 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    / PRODUCT GRID /
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    / CARD /
    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 10px;
    }

    .price {
      color: #c9a646;
      font-weight: bold;
      margin: 10px 0;
    }

    button {
      background: #c9a646;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    / FOOTER */
    footer {
      text-align: center;
      padding: 30px;
      margin-top: 40px;
      font-size: 14px;
      color: #888;
      background: white;
    }
  </style>

</head>

<body>

<header>SVORQ ✨</header>

<div class="hero">
  <h1>Timeless Luxury Jewellery</h1>
  <p>Elegance • Style • Perfection</p>
</div>

<div class="section">
  <h2>Our Collection</h2>

  <div class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1611591437281-460bfbe1220a">
      <h3>Gold Necklace</h3>
      <div class="price">₹999</div>
      <a href="https://wa.me/918309304255">
        <button>Buy Now</button>
      </a>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1605100804763-247f67b3557e">
      <h3>Diamond Ring</h3>
      <div class="price">₹1499</div>
      <a href="https://wa.me/918309304255">
        <button>Buy Now</button>
      </a>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1617038260897-41a1f14a8ca0">
      <h3>Elegant Earrings</h3>
      <div class="price">₹799</div>
      <a href="https://wa.me/918309304255">
        <button>Buy Now</button>
      </a>
    </div>

  </div>
</div>

<footer>
  © 2026 SVORQ — Luxury Redefined
</footer>

</body>
</html>

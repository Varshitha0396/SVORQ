<!DOCTYPE html>
<html>
<head>
  <title>SVORQ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; font-family: Arial; background: white; }
    header { background: black; color: gold; padding: 20px; text-align: center; font-size: 28px; }
    .hero { text-align: center; padding: 50px; }
    .section { padding: 20px; }
    .products { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
    .card { border: 1px solid #ddd; padding: 15px; width: 200px; text-align: center; }
    button { background: black; color: gold; padding: 10px; border: none; cursor: pointer; }
    h2 { text-align: center; }
  </style>
</head>

<body>

<header>SVORQ ✨</header>

<div class="hero">
  <h1>Style Beyond Limits</h1>
  <p>Jewelry & Fashion Collection</p>
</div>

<div class="section">
  <h2>Jewelry</h2>
  <div class="products">
    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Gold Necklace</h3>
      <p>₹999</p>
      <button>Order Now</button>
    </div>
  </div>
</div>

<div class="section">
  <h2>Clothing</h2>
  <div class="products">
    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Stylish Dress</h3>
      <p>₹1499</p>
      <button>Order Now</button>
    </div>
  </div>
</div>

</body>
</html>

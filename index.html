<!DOCTYPE html>
<html>
<head>
<title>SVORQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: #f8f6f2;
  color: #2c2c2c;
}

/* HEADER /
header {
  text-align: center;
  padding: 30px;
  font-size: 28px;
  letter-spacing: 3px;
  color: #c9a646;
  background: #ffffff;
}

/ HERO SECTION /
.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

.hero p {
  color: #777;
  font-size: 18px;
}

/ COLLECTION /
.section {
  padding: 60px 20px;
}

h2 {
  text-align: center;
  margin-bottom: 40px;
}

/ PRODUCTS GRID /
.products {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 25px;
}

.card {
  background: #ffffff;
  padding: 20px;
  width: 250px;
  border-radius: 12px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.card img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}

.price {
  color: #c9a646;
  font-weight: bold;
  margin: 10px 0;
}

/ BUTTON /
button {
  background: #c9a646;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 25px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

/ FOOTER */
footer {
  text-align: center;
  padding: 30px;
  background: #ffffff;
  margin-top: 50px;
  font-size: 14px;
  color: #888;
}

</style>
</head>

<body>

<header>SVORQ ✨</header>

<div class="hero">
  <h1>Timeless Luxury Jewellery</h1>
  <p>Elegance • Style • Perfection</p>
</div>

<div class="section">
  <h2>Our Collection</h2>

  <div class="products">

    <div class="card">
      <img src="https://via.placeholder.com/300x200">
      <h3>Gold Necklace</h3>
      <div class="price">₹999</div>
      <a href="https://wa.me/918309304255">
        <button>Buy Now</button>
      </a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200">
      <h3>Diamond Ring</h3>
      <div class="price">₹1499</div>
      <a href="https://wa.me/918309304255">
        <button>Buy Now</button>
      </a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200">
      <h3>Elegant Earrings</h3>
      <div class="price">₹799</div>
      <a href="https://wa.me/918309304255">
        <button>Buy Now</button>
      </a>
    </div>

  </div>
</div>

<footer>
  © 2026 SVORQ — Luxury Redefined
</footer>

</body>
</html>

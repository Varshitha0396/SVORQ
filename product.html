<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product | SVORQ</title>

  <!-- 🔥 FORCE CSS RELOAD -->
  <link rel="stylesheet" href="style.css?v=3">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="container header-clean">

    <img src="logo.png" class="logo-img" alt="SVORQ Logo">

    <div></div>

    <div class="header-right">
      🛒 <span id="cart-count">0</span>
    </div>

  </div>
</header>

<!-- PRODUCT SECTION -->
<section class="product-page">

  <div class="product-container">

    <!-- IMAGES -->
    <div class="product-images">
      <img id="main-img" src="" alt="Product Image">

      <div id="thumbnails" class="thumbnails"></div>
    </div>

    <!-- DETAILS -->
    <div class="product-details">
      <h1 id="product-name"></h1>

      <p class="price">
        ₹<span id="product-price"></span>
        <span class="old-price" id="product-old-price"></span>
      </p>

      <p id="product-desc"></p>

      <button class="btn-primary" onclick="addToCart()">
        Add to Cart
      </button>

      <button class="btn-secondary" onclick="buyNow()">
        Buy Now
      </button>

    </div>

  </div>

</section>

<script>

// GET PRODUCT
let product = JSON.parse(localStorage.getItem("selected_product"));

// 🔥 SAFETY CHECK
if (!product) {
  document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px;'>Product not found</h2>";
}

// LOAD DATA
document.getElementById("product-name").innerText = product.name;
document.getElementById("product-price").innerText = product.price;
document.getElementById("product-old-price").innerText = "₹" + product.originalPrice;
document.getElementById("product-desc").innerText = product.description;
document.getElementById("main-img").src = product.images[0];

// 🔥 THUMBNAILS
const thumbs = document.getElementById("thumbnails");

product.images.forEach(img => {
  thumbs.innerHTML += `
    <img src="${img}" onclick="changeImage('${img}')">
  `;
});

function changeImage(img) {
  document.getElementById("main-img").src = img;
}

// CART
let cart = JSON.parse(localStorage.getItem('svorq_cart')) || [];

function updateCartCount() {
  const count = cart.reduce((sum, item) => sum + item.quantity, 0);
  document.getElementById('cart-count').innerText = count;
}

function addToCart() {
  const existing = cart.find(x => x.id === product.id);

  if (existing) existing.quantity++;
  else cart.push({ ...product, quantity: 1 });

  localStorage.setItem('svorq_cart', JSON.stringify(cart));
  updateCartCount();

  alert("Added to cart 🛒");
}

// BUY NOW (WHATSAPP)
function buyNow() {
  const message = `I want to buy: ${product.name} for ₹${product.price}`;
  window.open(`https://wa.me/918309304255?text=${encodeURIComponent(message)}`);
}

// INIT
updateCartCount();

</script>

</body>
</html>
